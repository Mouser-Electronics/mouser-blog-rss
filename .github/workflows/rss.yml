name: Refresh RSS

permissions:
  contents: write

on:
  schedule:
    - cron: "13 * * * *"
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install Playwright
        run: |
          npm init -y
          npm install playwright
          npx playwright install

      - name: Fetch RSS using real browser
        run: |
          node << 'EOF'
          const { chromium } = require('playwright');
          const fs = require('fs');

          (async () => {
            const browser = await chromium.launch();
            const page = await browser.newPage();

            const url = "https://www.mouser.com/blog/DesktopModules/LiveBlog/Handlers/Syndication.ashx?mid=1009&PortalId=11&tid=545&ItemCount=20";

            await page.goto(url, { waitUntil: 'networkidle' });

            const content = await page.content();

            // Extract the RSS XML portion only
            const rssMatch = content.match(/<rss[\s\S]*<\/rss>/);

            if (rssMatch) {
              fs.writeFileSync('feed.xml', rssMatch[0]);
              console.log("✅ RSS extracted");
            } else {
              console.log("❌ RSS not found");
              fs.writeFileSync('feed.xml', content);
            }

            await browser.close();
          })();
          EOF

      - name: Commit updated feed
        run: |
          git config user.name "rss-bot"
          git config user.email "rss-bot@users.noreply.github.com"
          git add feed.xml
          git commit -m "Update feed.xml" || echo "No changes"
          git push
