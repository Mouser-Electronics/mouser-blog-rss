name: Refresh RSS

on:
  schedule:
    - cron: "13 * * * *"
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch Mouser RSS (rss2json proxy)
        run: |
          curl -L \
            "https://api.rss2json.com/v1/api.json?rss_url=https://www.mouser.com/blog/DesktopModules/LiveBlog/Handlers/Syndication.ashx?mid=1009&PortalId=11&tid=545&ItemCount=20" \
            -o raw.json

            
      - name: Convert JSON to RSS
        run: |
          echo '<?xml version="1.0" encoding="UTF-8"?>' > feed.xml
          echo '<rss version="2.0"><channel><title>Mouser Blog</title>' >> feed.xml
    
          jq -r '.items[] | "<item><title>\(.title)</title><link>\(.link)</link></item>"' raw.json >> feed.xml
    
          echo '</channel></rss>' >> feed.xml


      - name: Commit updated feed
        run: |
          git config user.name "rss-bot"
          git config user.email "rss-bot@users.noreply.github.com"
          git add feed.xml
          git diff --quiet || git commit -m "Update feed.xml"
          git push
