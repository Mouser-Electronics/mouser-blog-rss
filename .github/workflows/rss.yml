name: Refresh RSS

permissions:
  contents: write

on:
  schedule:
    - cron: "13 * * * *"
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch RSS via Textise proxy
        run: |
          curl -L \
            "https://textise.net/showtext.aspx?strURL=https://www.mouser.com/blog/DesktopModules/LiveBlog/Handlers/Syndication.ashx?mid=1009&PortalId=11&tid=545&ItemCount=20" \
            -o raw.html

      - name: Extract RSS from proxy
        run: |
          # Extract only RSS portion
          sed -n '/<rss/,/<\/rss>/p' raw.html > feed.xml

      - name: Commit updated feed
        run: |
          git config user.name "rss-bot"
          git config user.email "rss-bot@users.noreply.github.com"
          git add feed.xml
          git commit -m "Update feed.xml" || echo "No changes"
          git push
