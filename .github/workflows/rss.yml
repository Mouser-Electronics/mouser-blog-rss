name: Refresh RSS

on:
  schedule:
    - cron: "13 * * * *"
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch Mouser RSS
        run: |
          curl -L \
            -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64)" \
            -H "Accept: application/rss+xml,application/xml;q=0.9,*/*;q=0.8" \
            "https://www.mouser.com/blog/DesktopModules/LiveBlog/Handlers/Syndication.ashx?mid=1009&PortalId=11&tid=545&ItemCount=20" \
            -o feed.xml

      - name: Commit updated feed
        run: |
          git config user.name "rss-bot"
          git config user.email "rss-bot@github.com"
          git add feed.xml
          git diff --quiet || (git commit -m "Update feed" && git push)
``
