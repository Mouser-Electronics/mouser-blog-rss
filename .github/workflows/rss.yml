name: Refresh RSS

on:
  schedule:
    - cron: "13 * * * *"
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch Mouser RSS
        run: |
          curl -L \
            -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64)" \
            -H "Accept: application/rss+xml,application/xml;q=0.9,*/*;q=0.8" \
