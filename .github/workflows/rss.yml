name: Refresh RSS

permissions:
  contents: write

on:
  schedule:
    - cron: "13 * * * *"
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install Playwright
        run: |
          npm init -y
          npm install playwright
          npx playwright install chromium

      - name: Fetch RSS using real browser
        run: |
          node << 'EOF'
          const { chromium } = require('playwright');
          const fs = require('fs');

          (async () => {
            const browser = await chromium.launch({
              headless: true,
              args: ['--no-sandbox', '--disable-setuid-sandbox']
            });

            const context = await browser.newContext({
              userAgent: 'Mozilla/5.0 (Windows NT 10.0; Win64; x64)',
              viewport: { width: 1280, height: 800 }
            });

            const page = await context.newPage();

            const url = "https://www.mouser.com/blog/DesktopModules/LiveBlog/Handlers/Syndication.ashx?mid=1009&PortalId=11&tid=545&ItemCount=20";

            try {
              await page.goto(url, { waitUntil: 'domcontentloaded', timeout: 60000 });

              // Let Akamai / JS settle
              await page.waitForTimeout(8000);

              const content = await page.content();

              // Extract ONLY RSS XML
              const match = content.match(/<rss[\s\S]*<\/rss>/);

              if (match) {
                fs.writeFileSync('feed.xml', match[0]);
                console.log("✅ RSS extracted");
              } else {
                fs.writeFileSync('feed.xml', content);
                console.log("❌ RSS not found — likely still blocked");
              }

            } catch (err) {
              console.error("❌ Browser fetch failed:", err);
              fs.writeFileSync('feed.xml', 'ERROR FETCHING RSS');
            }

            await browser.close();
          })();
          EOF

      - name: Commit updated feed
        run: |
          git config user.name "rss-bot"
          git config user.email "rss-bot@users.noreply.github.com"
          git add feed.xml
          git commit -m "Update feed.xml" || echo "No changes"
          git push
